<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — ShopEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8c97e;
      --accent2: #c9a84c;
      --text: #f0ede8;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Navbar */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 60px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-user {
      font-size: 14px;
      color: var(--muted);
    }

    .nav-btn {
      padding: 9px 20px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .nav-btn.cart {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .nav-btn.cart:hover { border-color: var(--accent); color: var(--accent); }

    .nav-btn.logout {
      background: transparent;
      color: var(--muted);
      border: none;
    }

    .nav-btn.logout:hover { color: var(--text); }

    /* Hero */
    .hero {
      padding: 60px 60px 40px;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 8px;
    }

    .hero p { color: var(--muted); font-size: 16px; }

    /* Filter bar */
    .filter-bar {
      padding: 24px 60px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,201,126,0.08);
    }

    /* Products grid */
    .products-section {
      padding: 40px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: rgba(232,201,126,0.4);
      transform: translateY(-4px);
    }

    .card-img {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1f1f1f, #2a2a2a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .card-body { padding: 20px; }

    .card-category {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      gap: 8px;
    }

    .price {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .price span {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
    }

    .add-btn {
      padding: 9px 18px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .add-btn:hover { background: var(--accent2); }
    .add-btn:active { transform: scale(0.96); }
    .add-btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 80px;
      color: var(--muted);
      font-size: 16px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1a1a1a;
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      nav, .hero, .filter-bar, .products-section { padding-left: 20px; padding-right: 20px; }
      .hero h1 { font-size: 28px; }
    }

    .add-btn {
      padding: 11px 22px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-btn:hover { background: var(--accent2); }

    .delete-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid rgba(229,115,115,0.4);
      color: #e57373;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(229,115,115,0.1); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      width: 100%; max-width: 480px;
      padding: 32px;
    }
    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }
    .field input, .field textarea, .field select {
      width: 100%; padding: 11px 14px;
      background: #0f0f0f; border: 1px solid #2a2a2a;
      border-radius: 8px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--accent);
    }
    .modal-btns { display: flex; gap: 10px; margin-top: 8px; }
    .modal-btns .save-btn {
      flex: 1; padding: 13px;
      background: var(--accent); color: #0f0f0f;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .modal-btns .save-btn:hover { background: var(--accent2); }
    .modal-btns .cancel-btn {
      flex: 1; padding: 13px;
      background: transparent; color: var(--muted);
      border: 1px solid #2a2a2a; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .modal-btns .cancel-btn:hover { color: var(--text); border-color: var(--muted); }
    .msg { margin-top: 12px; font-size: 13px; padding: 10px; border-radius: 6px; display: none; }
    .msg.error   { background: rgba(229,115,115,0.15); color: #e57373; display: block; }
    .msg.success { background: rgba(129,199,132,0.15); color: #81c784; display: block; }
    
  </style>
</head>
<body>

  <nav>
    <a class="brand" href="products.html">ShopEase</a>
    <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <a class="nav-btn cart" href="orders.html">📦 My Orders</a>
    <a class="nav-btn cart" href="cart.html">🛒 Cart</a>
    <button class="nav-btn logout" onclick="logout()">Logout</button>
  </div>
  </nav>

  <div class="hero" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
  <div>
    <h1>Our Products</h1>
    <p>Discover our curated collection of premium products</p>
  </div>
  <button class="add-btn" id="addProductBtn" style="display:none" onclick="openAddModal()">
    + Add Product
  </button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterCategory('all', this)">All</button>
  </div>

  <div class="products-section">
    <div class="grid" id="grid">
      <div class="loading">Loading products...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) window.location.href = 'login.html';

    document.getElementById('nav-user').textContent = `Hi, ${user.name || 'User'}`;

    let allProducts = [];
    let categories = [];

    const ICONS = {
      'Mobiles': '📱', 'Laptops': '💻', 'Electronics': '🔌',
      "Men's Clothing": '👕', "Women's Clothing": '👗',
      'default': '🛍️'
    };

    async function loadProducts() {
      try {
        const res = await fetch(`${API}/products`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        allProducts = await res.json();
        categories = [...new Set(allProducts.map(p => p.category_name))];
        renderFilters();
        renderProducts(allProducts);
      } catch (err) {
        document.getElementById('grid').innerHTML = '<div class="loading">Failed to load products.</div>';
      }
    }

    function renderFilters() {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = '<button class="filter-btn active" onclick="filterCategory(\'all\', this)">All</button>';
      
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = cat;
        btn.onclick = () => filterCategory(cat, btn);
        bar.appendChild(btn);
      });
    }

    function filterCategory(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category_name === cat);
      renderProducts(filtered);
    }

    function renderProducts(products) {
      const grid = document.getElementById('grid');
      if (products.length === 0) {
        grid.innerHTML = '<div class="loading">No products found.</div>';
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="card">
          <div class="card-img">${ICONS[p.category_name] || ICONS.default}</div>
          <div class="card-body">
            <div class="card-category">${p.category_name}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.description}</div>
            <div class="card-footer">
              <div class="price">₹${Number(p.price).toLocaleString('en-IN')} <span>incl. taxes</span></div>
              <div style="display:flex; gap:8px; align-items:center;">
                <button class="add-btn" style="padding:8px 12px; font-size:12px; white-space:nowrap;" onclick="addToCart(${p.id}, this)" ${p.stock === 0 ? 'disabled' : ''}>
                  ${p.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
                </button>
                ${user.role === 'admin' ? `<button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>` : ''}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function addToCart(productId, btn) {
      btn.disabled = true;
      btn.textContent = 'Adding...';
      try {
        const res = await fetch(`${API}/cart/add`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ product_id: productId, quantity: 1 })
        });
        const data = await res.json();
        if (res.ok) {
          showToast('✓ Added to cart!');
        } else {
          showToast(data.error || 'Failed to add.');
        }
      } catch {
        showToast('Connection error.');
      }
      btn.disabled = false;
      btn.textContent = 'Add to Cart';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    // ── Show Add button only for admin ─────────────────────
    if (user.role === 'admin') {
      document.getElementById('addProductBtn').style.display = 'block';
      loadCategoriesForModal();
    }

    // ── Load categories into modal dropdown ────────────────
    async function loadCategoriesForModal() {
      try {
        const res  = await fetch(`${API}/categories`);
        const cats = await res.json();
        const select = document.getElementById('pCategory');

        cats.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat.id;
          opt.textContent = cat.name;
          select.appendChild(opt);

          (cat.subcategories || []).forEach(sub => {
            const subOpt = document.createElement('option');
            subOpt.value = sub.id;
            subOpt.textContent = '↳ ' + sub.name;
            select.appendChild(subOpt);
          });
        });
      } catch(e) {}
    }

    // ── Open modal ─────────────────────────────────────────
    function openAddModal() {
      document.getElementById('modalOverlay').classList.add('open');
    }

    // ── Close modal ────────────────────────────────────────
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('modal-msg').className = 'msg';
      ['pName', 'pDesc', 'pPrice', 'pStock', 'pImage'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }

    // ── Close modal when clicking outside ─────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
    });

    // ── Save new product ───────────────────────────────────
    async function saveProduct() {
      const name        = document.getElementById('pName').value.trim();
      const description = document.getElementById('pDesc').value.trim();
      const price       = document.getElementById('pPrice').value;
      const stock       = document.getElementById('pStock').value;
      const category_id = document.getElementById('pCategory').value;
      const image_url   = document.getElementById('pImage').value.trim();
      const msg         = document.getElementById('modal-msg');
      msg.className     = 'msg';

      if (!name || !price || !stock) {
        msg.className   = 'msg error';
        msg.textContent = 'Name, price and stock are required.';
        return;
      }

      try {
        const res = await fetch(`${API}/products`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ name, description, price, stock, category_id, image_url })
        });
        const data = await res.json();

        if (res.ok) {
          msg.className   = 'msg success';
          msg.textContent = 'Product added successfully!';
          setTimeout(() => { closeModal(); loadProducts(); }, 1200);
        } else {
          msg.className   = 'msg error';
          msg.textContent = data.error || 'Failed to add product.';
        }
      } catch(e) {
        msg.className   = 'msg error';
        msg.textContent = 'Connection error.';
      }
    }

    // ── Delete product ─────────────────────────────────────
    async function deleteProduct(productId) {
      if (!confirm('Are you sure you want to delete this product?')) return;

      try {
        const res = await fetch(`${API}/products/${productId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
          showToast('Product deleted.');
          loadProducts();
        } else {
          const data = await res.json();
          showToast(data.error || 'Delete failed.');
        }
      } catch(e) {
        showToast('Connection error.');
      }
    }

    loadProducts();
  </script>
  
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Add New Product</h2>
      <div class="field">
        <label>Product Name</label>
        <input type="text" id="pName" placeholder="e.g. iPhone 15" />
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="pDesc" rows="2" placeholder="Short description..."></textarea>
      </div>
      <div class="field">
        <label>Price (₹)</label>
        <input type="number" id="pPrice" placeholder="e.g. 79999" />
      </div>
      <div class="field">
        <label>Stock</label>
        <input type="number" id="pStock" placeholder="e.g. 50" />
      </div>
      <div class="field">
        <label>Category</label>
        <select id="pCategory">
          <option value="">Select category...</option>
        </select>
      </div>
      <div class="field">
        <label>Image URL (optional)</label>
        <input type="text" id="pImage" placeholder="https://..." />
      </div>
      <div class="msg" id="modal-msg"></div>
      <div class="modal-btns">
        <button class="save-btn" onclick="saveProduct()">Add Product</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
