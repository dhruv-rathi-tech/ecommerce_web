<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — ShopEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8c97e;
      --accent2: #c9a84c;
      --text: #f0ede8;
      --muted: #888;
      --error: #e57373;
      --success: #81c784;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 60px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-right { display: flex; align-items: center; gap: 24px; }
    .nav-user  { font-size: 14px; color: var(--muted); }

    .nav-btn {
      padding: 9px 20px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }

    .nav-btn.back {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .nav-btn.back:hover   { border-color: var(--accent); color: var(--accent); }
    .nav-btn.logout       { background: transparent; color: var(--muted); }
    .nav-btn.logout:hover { color: var(--text); }

    .page-header {
      padding: 50px 60px 30px;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      margin-bottom: 6px;
    }

    .page-header p { color: var(--muted); font-size: 15px; }

    .content { padding: 40px 60px; max-width: 900px; }

    /* ── Order Card ── */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .order-card:hover { border-color: rgba(232,201,126,0.3); }

    .order-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }

    .order-meta   { display: flex; flex-direction: column; gap: 4px; }

    .order-id {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
    }

    .order-date { font-size: 13px; color: var(--muted); }

    .badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .badge {
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge-pending          { background: rgba(232,201,126,0.12); color: var(--accent);  border: 1px solid rgba(232,201,126,0.3); }
    .badge-confirmed        { background: rgba(129,199,132,0.12); color: var(--success); border: 1px solid rgba(129,199,132,0.3); }
    .badge-shipped          { background: rgba(100,160,220,0.12); color: #64a0dc;        border: 1px solid rgba(100,160,220,0.3); }
    .badge-delivered        { background: rgba(129,199,132,0.15); color: var(--success); border: 1px solid rgba(129,199,132,0.4); }
    .badge-cancelled        { background: rgba(229,115,115,0.12); color: var(--error);   border: 1px solid rgba(229,115,115,0.3); }
    .badge-paid             { background: rgba(129,199,132,0.12); color: var(--success); border: 1px solid rgba(129,199,132,0.3); }
    .badge-refund_initiated { background: rgba(100,160,220,0.12); color: #64a0dc;        border: 1px solid rgba(100,160,220,0.3); }
    .badge-refunded         { background: rgba(100,160,220,0.12); color: #64a0dc;        border: 1px solid rgba(100,160,220,0.3); }

    /* ── Order Items ── */
    .order-items { padding: 0 24px; }

    .order-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .order-item:last-child { border-bottom: none; }

    .item-left { display: flex; align-items: center; gap: 14px; }

    .item-icon {
      width: 44px; height: 44px;
      background: #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .item-name { font-size: 15px; font-weight: 500; }
    .item-qty  { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .item-subtotal {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    /* ── Order Footer ── */
    .order-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }

    .order-count { font-size: 13px; color: var(--muted); }
    .order-total { font-size: 18px; font-weight: 700; color: var(--accent); }

    .cancel-btn {
      padding: 9px 18px;
      background: transparent;
      border: 1px solid rgba(229,115,115,0.4);
      color: var(--error);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cancel-btn:hover    { background: rgba(229,115,115,0.1); border-color: var(--error); }
    .cancel-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty & Loading ── */
    .empty-state {
      text-align: center;
      padding: 100px 40px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 64px; margin-bottom: 20px; }

    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p { margin-bottom: 24px; font-size: 15px; }

    .empty-state a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: #0f0f0f;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }

    .empty-state a:hover { background: var(--accent2); }

    .loading { text-align: center; padding: 80px; color: var(--muted); font-size: 16px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px; right: 30px;
      background: #1a1a1a;
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      nav, .page-header, .content { padding-left: 20px; padding-right: 20px; }
      .page-header h1 { font-size: 28px; }
      .order-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="brand" href="products.html">ShopEase</a>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <a class="nav-btn back" href="products.html">← Products</a>
      <button class="nav-btn logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-header">
    <h1>My Orders</h1>
    <p>Track all your purchases and their status</p>
  </div>

  <div class="content" id="content">
    <div class="loading">Loading your orders...</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API   = 'http://localhost:3000';
    const token = localStorage.getItem('token');
    const user  = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) window.location.href = 'login.html';

    document.getElementById('nav-user').textContent = `Hi, ${user.name || 'User'}`;

    const ICONS = {
      'Mobiles': '📱', 'Laptops': '💻', 'Electronics': '🔌',
      "Men's Clothing": '👕', "Women's Clothing": '👗', 'default': '🛍️'
    };

    // ── Load Orders ──────────────────────────────────────────
    async function loadOrders() {
      try {
        const res = await fetch(`${API}/orders/my`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) { window.location.href = 'login.html'; return; }

        const orders = await res.json();
        render(orders);

      } catch (err) {
        document.getElementById('content').innerHTML =
          '<div class="loading">Could not load orders. Make sure your server is running.</div>';
      }
    }

    // ── Check if order is within 24-hour cancel window ───────
    function canCancel(order) {
      if (['cancelled', 'delivered', 'shipped'].includes(order.status)) return false;
      const hoursPassed = (Date.now() - new Date(order.created_at).getTime()) / (1000 * 60 * 60);
      return hoursPassed <= 24;
    }

    // ── Render Orders ────────────────────────────────────────
    function render(orders) {
      const content = document.getElementById('content');

      if (!orders || orders.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="icon">📦</div>
            <h2>No orders yet</h2>
            <p>Once you complete a purchase, it will appear here</p>
            <a href="products.html">Start Shopping</a>
          </div>`;
        return;
      }

      content.innerHTML = orders.map(order => {
        let items = order.items;
        if (typeof items === 'string') {
          try { items = JSON.parse(items); } catch(e) { items = []; }
        }
        items = items || [];

        const showCancelBtn = canCancel(order);

        return `
          <div class="order-card" id="order-${order.id}">

            <div class="order-head">
              <div class="order-meta">
                <div class="order-id">Order #${order.id}</div>
                <div class="order-date">${formatDate(order.created_at)}</div>
              </div>
              <div class="badges">
                <span class="badge badge-${order.status}">${order.status}</span>
                <span class="badge badge-${order.payment_status}">${order.payment_status}</span>
                ${showCancelBtn
                  ? `<button class="cancel-btn" id="cancelBtn-${order.id}"
                       onclick="cancelOrder(${order.id})">
                       ✕ Cancel
                     </button>`
                  : ''
                }
              </div>
            </div>

            <div class="order-items">
              ${items.map(item => `
                <div class="order-item">
                  <div class="item-left">
                    <div class="item-icon">${ICONS[item.category_name] || ICONS.default}</div>
                    <div>
                      <div class="item-name">${item.name}</div>
                      <div class="item-qty">
                        Qty: ${item.quantity} × ₹${Number(item.price).toLocaleString('en-IN')}
                      </div>
                    </div>
                  </div>
                  <div class="item-subtotal">
                    ₹${(item.price * item.quantity).toLocaleString('en-IN')}
                  </div>
                </div>
              `).join('')}
            </div>

            <div class="order-foot">
              <span class="order-count">
                ${items.length} item${items.length !== 1 ? 's' : ''}
              </span>
              <span class="order-total">
                Total: ₹${Number(order.total).toLocaleString('en-IN')}
              </span>
            </div>

          </div>
        `;
      }).join('');
    }

    // ── Cancel Order ─────────────────────────────────────────
    async function cancelOrder(orderId) {
      if (!confirm('Are you sure you want to cancel this order? This cannot be undone.')) return;

      const btn = document.getElementById(`cancelBtn-${orderId}`);
      btn.disabled    = true;
      btn.textContent = 'Cancelling...';

      try {
        const res = await fetch(`${API}/orders/${orderId}/cancel`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await res.json();

        if (res.ok) {
          showToast('✓ ' + data.message);
          setTimeout(() => loadOrders(), 1500);
        } else {
          showToast(data.error || 'Could not cancel order.');
          btn.disabled    = false;
          btn.textContent = '✕ Cancel';
        }

      } catch (e) {
        showToast('Connection error. Try again.');
        btn.disabled    = false;
        btn.textContent = '✕ Cancel';
      }
    }

    // ── Helpers ──────────────────────────────────────────────
    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-IN', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function showToast(message) {
      const t = document.getElementById('toast');
      t.textContent = message;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    loadOrders();
  </script>
</body>
</html>
