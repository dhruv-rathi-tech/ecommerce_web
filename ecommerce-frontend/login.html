<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ShopEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8c97e;
      --accent2: #c9a84c;
      --text: #f0ede8;
      --muted: #888;
      --error: #e57373;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left panel */
    .left {
      background: linear-gradient(135deg, #1a1200 0%, #2a1f00 50%, #1a1200 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }

    .left::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,201,126,0.15) 0%, transparent 70%);
      top: -100px; left: -100px;
    }

    .left::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,201,126,0.1) 0%, transparent 70%);
      bottom: -50px; right: -50px;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      color: var(--accent);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .tagline {
      font-size: 18px;
      color: rgba(240,237,232,0.6);
      line-height: 1.7;
      max-width: 320px;
      position: relative;
      z-index: 1;
    }

    .deco-line {
      width: 60px; height: 3px;
      background: var(--accent);
      margin: 32px 0;
      position: relative;
      z-index: 1;
    }

    /* Right panel */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
      background: var(--bg);
    }

    .form-box {
      width: 100%;
      max-width: 380px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 40px;
    }

    .subtitle a {
      color: var(--accent);
      text-decoration: none;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: var(--accent2); }
    .btn:active { transform: scale(0.98); }

    .msg {
      margin-top: 16px;
      font-size: 14px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .msg.error { background: rgba(229,115,115,0.15); color: var(--error); display: block; }
    .msg.success { background: rgba(129,199,132,0.15); color: #81c784; display: block; }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .left { display: none; }
      .right { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="brand">ShopEase</div>
    <div class="deco-line"></div>
    <p class="tagline">Your premium destination for electronics, fashion, and everything in between.</p>
  </div>

  <div class="right">
    <div class="form-box">
      <h2>Welcome back</h2>
      <p class="subtitle">Don't have an account? <a href="register.html">Sign up</a></p>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn" onclick="login()">Sign In</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      msg.className = 'msg';

      if (!email || !password) {
        msg.className = 'msg error';
        msg.textContent = 'Please fill in all fields.';
        return;
      }

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.className = 'msg error';
          msg.textContent = data.error || 'Login failed.';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'products.html';

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Could not connect to server.';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
